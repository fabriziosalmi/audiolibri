# Security / privacy response headers for audiolibri.org (nginx).
#
# Usage on origin-01: inside the server { } block for audiolibri.org add:
#     include /var/www/audiolibri.org/deploy/security-headers.conf;
# then `nginx -t && systemctl reload nginx`.
#
# NOTE on CSP: the site uses inline <script> (FOUC theme switch, SW registration,
# JSON-LD) and inline <style>/style="" (PAGE_CSS, --cover-hue, hero backdrop),
# so script-src/style-src need 'unsafe-inline'. Roll out with
# Content-Security-Policy-Report-Only first and watch for violations before
# switching to the enforcing header below.

# --- Transport / sniffing / framing -----------------------------------------
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;

# --- Permissions-Policy: disable everything the site never uses --------------
add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=(), magnetometer=(), accelerometer=(self), gyroscope=(self), fullscreen=(self), picture-in-picture=(self)" always;

# --- Content-Security-Policy --------------------------------------------------
# youtube-nocookie/youtube for the player; ytimg for thumbnails; Google Fonts
# (drop fonts.googleapis/gstatic here once fonts are self-hosted).
add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'self'; img-src 'self' data: https://i.ytimg.com https://*.ytimg.com; script-src 'self' 'unsafe-inline' https://www.youtube.com https://www.youtube-nocookie.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-src https://www.youtube-nocookie.com https://www.youtube.com; connect-src 'self'; upgrade-insecure-requests" always;
